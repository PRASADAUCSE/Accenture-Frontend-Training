<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel= "stylesheet" href= "style.css">
</head>
<body>
    <div class="navbar">
        <div class="logo">
            <img src="images/Bubble_Consult.png" alt="logo with name" />
        </div>

        <div class="nav-links">
            <h1>PROJECTS</h1>
            <h1>SERVICES</h1>
            <h1>ABOUT US</h1>
            <h1>BLOG</h1>
            <h1>SHOP</h1>
            <h1>PAGES <span><img src="images/dropdown_arrow.png" alt="arrow down" /></span></h1>
            <div class="touch">
                <h1>GET IN TOUCH</h1>
            </div>
            
        </div>
    </div>
    <div class="main-container">
        <div class="image">
            <img src="images/Stack.png" alt="stack of papers" />
        </div>
        <div class="text">
            <img src = "images/Bubble_Consult.png" alt = "logo with name"/>
            <h1>Take Your Business to the Next Level</h1>
            <div class = "d-flex flex-direction-row">
                <button class = "btn">Get Quote</button>
                <button class = "btn-blue">Contact Us</button>
            </div>
        </div>
    </div>
    <div class = "footer">
        <hr/>
        <div class="brand-row">
            <div class = "bottom-container">
                <h1> BRANDS WE'VE WORKED WITH </h1>
            </div>
            
            <div class = "img-container">
                <img src = "images/Food_Studio.jpg" alt = "brand1"/>
                <img src = "images/creative_Studio.png" alt = "brand2"/>
                <img src = "images/inmotion.png" alt = "brand3"/>
                <img src = "images/inmotion.png" alt = "brand4"/>
                <img src = "images/Abstract.jpg" alt = "brand5"/>
                <img src = "images/Invision.png" alt = "brand6"/>
            </div>
        </div>
        <hr/>
    </div>
</body>
</html>
